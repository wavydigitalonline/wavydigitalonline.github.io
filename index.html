<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wavy Digital | Web Design Studio — Websites That Convert</title>
<meta name="description" content="Wavy Digital builds fast, professional websites that attract customers and grow your business. WhatsApp us today.">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --black: #080808;
    --white: #f5f2ee;
    --accent: #c8f55a;
    --accent-dark: #a8d93a;
    --mid: #1a1a1a;
    --muted: #888;
    --border: rgba(255,255,255,0.08);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    line-height: 1.6;
    overflow-x: hidden;
    cursor: none;
  }

  /* Custom cursor */
  .cursor { width: 10px; height: 10px; background: var(--accent); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); mix-blend-mode: difference; }
  .cursor-ring { width: 36px; height: 36px; border: 1.5px solid var(--accent); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9998; transform: translate(-50%,-50%); transition: all 0.15s ease; opacity: 0.5; }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 22px 48px;
    backdrop-filter: blur(16px);
    background: rgba(8,8,8,0.8);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem; letter-spacing: -0.02em; color: var(--white); text-decoration: none; }
  .nav-logo span { color: var(--accent); }
  .nav-links { display: flex; align-items: center; gap: 32px; }
  .nav-link { color: rgba(245,242,238,0.6); font-size: 0.85rem; font-weight: 500; text-decoration: none; transition: color 0.2s; }
  .nav-link:hover { color: var(--white); }
  .nav-cta { background: var(--accent); color: var(--black); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.8rem; letter-spacing: 0.05em; text-transform: uppercase; padding: 10px 22px; border-radius: 100px; text-decoration: none; transition: background 0.2s, transform 0.2s; white-space: nowrap; }
  .nav-cta:hover { background: var(--accent-dark); transform: scale(0.97); }

  /* HERO */
  .hero {
    min-height: 100vh;
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 0 48px 80px;
    position: relative; overflow: hidden;
  }
  .hero-bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 80% 20%, rgba(200,245,90,0.13) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 10% 80%, rgba(200,245,90,0.07) 0%, transparent 50%);
  }
  .hero-noise {
    position: absolute; inset: 0; opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    pointer-events: none;
  }
  .hero-tag { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 28px; opacity: 0; animation: fadeUp 0.8s ease 0.2s forwards; display: flex; align-items: center; gap: 12px; }
  .hero-tag::before { content: ''; display: block; width: 32px; height: 1px; background: var(--accent); }
  .hero-headline { font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(2.2rem, 7vw, 8rem); line-height: 0.95; letter-spacing: -0.03em; margin-bottom: 44px; opacity: 0; animation: fadeUp 0.8s ease 0.4s forwards; }
  .hero-headline em { font-style: normal; color: var(--accent); display: block; }
  .hero-bottom { display: flex; align-items: flex-end; justify-content: space-between; gap: 40px; flex-wrap: wrap; opacity: 0; animation: fadeUp 0.8s ease 0.6s forwards; }
  .hero-sub { max-width: 480px; color: rgba(245,242,238,0.6); font-size: 1.05rem; line-height: 1.75; }
  .hero-sub strong { color: var(--white); font-weight: 500; }
  .hero-actions { display: flex; gap: 16px; align-items: center; flex-shrink: 0; flex-wrap: wrap; }
  .btn-primary { background: var(--accent); color: var(--black); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.9rem; padding: 16px 32px; border-radius: 100px; text-decoration: none; transition: transform 0.2s, background 0.2s; display: inline-flex; align-items: center; gap: 8px; white-space: nowrap; }
  .btn-primary:hover { transform: scale(0.97); background: var(--accent-dark); }
  .btn-ghost { color: var(--white); font-family: 'Syne', sans-serif; font-weight: 600; font-size: 0.9rem; text-decoration: none; opacity: 0.55; transition: opacity 0.2s; white-space: nowrap; }
  .btn-ghost:hover { opacity: 1; }
  .hero-scroll { position: absolute; bottom: 32px; right: 48px; font-size: 0.68rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); display: flex; align-items: center; gap: 12px; opacity: 0; animation: fadeUp 0.8s ease 1.2s forwards; }
  .hero-scroll::before { content: ''; display: block; width: 40px; height: 1px; background: var(--muted); }

  /* STATS BAR */
  .stats-bar { background: var(--mid); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 28px 48px; display: flex; justify-content: space-around; flex-wrap: wrap; gap: 24px; }
  .stat-item { text-align: center; }
  .stat-item-num { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.8rem; color: var(--accent); letter-spacing: -0.02em; line-height: 1; margin-bottom: 4px; }
  .stat-item-label { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }

  /* MARQUEE */
  .marquee-wrap { overflow: hidden; padding: 16px 0; background: var(--accent); }
  .marquee-track { display: flex; animation: marquee 22s linear infinite; white-space: nowrap; }
  .marquee-item { font-family: 'Syne', sans-serif; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--black); padding: 0 32px; flex-shrink: 0; opacity: 0.7; }
  .marquee-item span { opacity: 1; margin-right: 32px; }

  /* SECTIONS */
  section { padding: 120px 48px; }
  .section-label { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: var(--accent); margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
  .section-label::after { content: ''; flex: 1; max-width: 40px; height: 1px; background: var(--accent); }

  /* WHY */
  .why { background: var(--mid); }
  .why-header { margin-bottom: 72px; display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 32px; }
  .why-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(2rem, 5vw, 3.5rem); letter-spacing: -0.02em; line-height: 1.05; max-width: 520px; }
  .why-sub { max-width: 320px; color: rgba(245,242,238,0.5); font-size: 0.95rem; line-height: 1.75; }
  .why-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 2px; }
  .why-card { background: var(--black); padding: 44px 36px; position: relative; overflow: hidden; transition: background 0.3s; }
  .why-card:hover { background: #0d0d0d; }
  .why-card::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--accent); transform: scaleX(0); transform-origin: left; transition: transform 0.4s; }
  .why-card:hover::after { transform: scaleX(1); }
  .why-icon { font-size: 2rem; margin-bottom: 20px; display: block; }
  .why-card-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.05rem; margin-bottom: 12px; }
  .why-card-desc { color: rgba(245,242,238,0.5); font-size: 0.88rem; line-height: 1.75; }

  /* SERVICES */
  .services { background: var(--black); }
  .services-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 80px; flex-wrap: wrap; gap: 32px; }
  .services-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(2rem, 5vw, 3.5rem); line-height: 1.05; letter-spacing: -0.02em; max-width: 480px; }
  .services-sub { max-width: 280px; color: rgba(245,242,238,0.5); font-size: 0.92rem; line-height: 1.75; }
  .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 2px; }
  .service-card { background: var(--mid); padding: 44px 36px; position: relative; overflow: hidden; transition: background 0.3s; }
  .service-card:hover { background: #222; }
  .service-card::before { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: var(--accent); transform: scaleX(0); transform-origin: left; transition: transform 0.4s; }
  .service-card:hover::before { transform: scaleX(1); }
  .service-num { font-family: 'Syne', sans-serif; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.18em; color: var(--accent); margin-bottom: 28px; }
  .service-icon { font-size: 2.2rem; margin-bottom: 20px; display: block; }
  .service-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.2rem; margin-bottom: 14px; line-height: 1.2; }
  .service-desc { color: rgba(245,242,238,0.5); font-size: 0.88rem; line-height: 1.75; margin-bottom: 20px; }
  .service-cta { color: var(--accent); font-size: 0.8rem; font-weight: 600; font-family: 'Syne', sans-serif; letter-spacing: 0.05em; display: inline-flex; align-items: center; gap: 6px; text-decoration: none; }

  /* WORK */
  .work { background: var(--mid); }
  .work-header { margin-bottom: 56px; }
  .work-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(2rem, 5vw, 3.5rem); letter-spacing: -0.02em; line-height: 1.05; margin-bottom: 16px; }
  .work-intro { color: rgba(245,242,238,0.55); font-size: 1rem; max-width: 480px; line-height: 1.75; }

  /* Featured card */
  .work-featured { background: var(--black); border-radius: 16px; overflow: hidden; display: grid; grid-template-columns: 1fr 1fr; min-height: 440px; margin-bottom: 3px; transition: transform 0.3s; }
  .work-featured:hover { transform: translateY(-4px); }
  .work-featured-visual { position: relative; overflow: hidden; }
  .work-featured-visual img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.5s; }
  .work-featured:hover .work-featured-visual img { transform: scale(1.04); }
  .work-featured-visual::after { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(200,245,90,0.08) 0%, transparent 60%); pointer-events: none; }
  .work-card-info { padding: 56px 48px; display: flex; flex-direction: column; justify-content: center; }
  .work-tag { display: inline-flex; align-items: center; gap: 8px; background: rgba(200,245,90,0.1); border: 1px solid rgba(200,245,90,0.2); color: var(--accent); font-size: 0.68rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; padding: 6px 14px; border-radius: 100px; margin-bottom: 28px; width: fit-content; }
  .work-client { font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(1.6rem, 3.5vw, 2.2rem); letter-spacing: -0.02em; margin-bottom: 16px; line-height: 1.1; }
  .work-desc { color: rgba(245,242,238,0.55); font-size: 0.95rem; line-height: 1.75; margin-bottom: 36px; }
  .work-link { display: inline-flex; align-items: center; gap: 10px; color: var(--accent); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.85rem; text-decoration: none; letter-spacing: 0.05em; transition: gap 0.2s; }
  .work-link:hover { gap: 16px; }

  /* Grid cards */
  .work-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 3px; }
  .work-grid-card { background: var(--black); border-radius: 12px; overflow: hidden; transition: transform 0.3s; display: flex; flex-direction: column; }
  .work-grid-card:hover { transform: translateY(-4px); }
  .work-grid-thumb { position: relative; overflow: hidden; height: 200px; }
  .work-grid-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.5s; }
  .work-grid-card:hover .work-grid-thumb img { transform: scale(1.06); }
  .work-grid-thumb::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 40%, rgba(8,8,8,0.65) 100%); pointer-events: none; }
  .work-grid-body { padding: 26px 26px 30px; flex: 1; display: flex; flex-direction: column; }
  .work-grid-tag { display: inline-flex; background: rgba(200,245,90,0.08); border: 1px solid rgba(200,245,90,0.15); color: var(--accent); font-size: 0.62rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; padding: 4px 10px; border-radius: 100px; margin-bottom: 12px; width: fit-content; }
  .work-grid-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.15rem; letter-spacing: -0.01em; margin-bottom: 8px; }
  .work-grid-desc { color: rgba(245,242,238,0.5); font-size: 0.84rem; line-height: 1.65; margin-bottom: 18px; flex: 1; }
  .work-grid-link { display: inline-flex; align-items: center; gap: 8px; color: var(--accent); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.8rem; text-decoration: none; letter-spacing: 0.04em; transition: gap 0.2s; margin-top: auto; }
  .work-grid-link:hover { gap: 14px; }

  /* ABOUT */
  .about { background: var(--black); }
  .about-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; }
  .about-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(2rem, 4vw, 3rem); letter-spacing: -0.02em; line-height: 1.1; margin-bottom: 32px; }
  .about-body { color: rgba(245,242,238,0.6); font-size: 1rem; line-height: 1.8; margin-bottom: 20px; }
  .about-location { display: flex; align-items: center; gap: 10px; color: var(--accent); font-size: 0.85rem; font-weight: 500; margin-top: 32px; }
  .about-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; }
  .stat-card { background: var(--mid); padding: 36px 28px; }
  .stat-num { font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(1.8rem, 3vw, 2.8rem); color: var(--accent); letter-spacing: -0.03em; line-height: 1; margin-bottom: 8px; word-break: break-word; }
  .stat-label { color: rgba(245,242,238,0.5); font-size: 0.82rem; line-height: 1.5; }

  /* CTA STRIP */
  .cta-strip { background: var(--mid); padding: 80px 48px; display: flex; align-items: center; justify-content: space-between; gap: 40px; flex-wrap: wrap; border-top: 1px solid var(--border); }
  .cta-strip-text h2 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(1.6rem, 4vw, 2.8rem); letter-spacing: -0.02em; margin-bottom: 12px; }
  .cta-strip-text p { color: rgba(245,242,238,0.55); font-size: 1rem; max-width: 440px; line-height: 1.7; }
  .cta-strip-actions { display: flex; gap: 16px; flex-shrink: 0; flex-wrap: wrap; }

  /* CONTACT */
  .contact { background: var(--accent); padding: 120px 48px; text-align: center; position: relative; overflow: hidden; }
  .contact::before { content: 'WAVY'; position: absolute; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 30vw; color: rgba(0,0,0,0.06); top: 50%; left: 50%; transform: translate(-50%,-50%); pointer-events: none; white-space: nowrap; }
  .contact-label { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(0,0,0,0.5); margin-bottom: 24px; }
  .contact-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(2.5rem, 7vw, 6rem); letter-spacing: -0.03em; color: var(--black); line-height: 1; margin-bottom: 20px; }
  .contact-sub { color: rgba(0,0,0,0.55); font-size: 1.05rem; max-width: 480px; margin: 0 auto 48px; line-height: 1.7; }
  .contact-actions { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
  .btn-dark { background: var(--black); color: var(--accent); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem; padding: 18px 36px; border-radius: 100px; text-decoration: none; transition: transform 0.2s, opacity 0.2s; display: inline-flex; align-items: center; gap: 10px; white-space: nowrap; }
  .btn-dark:hover { transform: scale(0.97); opacity: 0.9; }
  .btn-outline-dark { background: transparent; border: 2px solid var(--black); color: var(--black); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem; padding: 18px 36px; border-radius: 100px; text-decoration: none; transition: background 0.2s, transform 0.2s; white-space: nowrap; }
  .btn-outline-dark:hover { background: rgba(0,0,0,0.08); transform: scale(0.97); }

  /* FOOTER */
  footer { background: var(--black); border-top: 1px solid var(--border); padding: 40px 48px; }
  .footer-main { display: flex; align-items: flex-start; justify-content: space-between; gap: 40px; flex-wrap: wrap; margin-bottom: 40px; }
  .footer-brand .footer-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem; color: var(--white); text-decoration: none; display: block; margin-bottom: 12px; }
  .footer-brand .footer-logo span { color: var(--accent); }
  .footer-brand p { color: var(--muted); font-size: 0.85rem; max-width: 240px; line-height: 1.6; }
  .footer-links h4 { font-family: 'Syne', sans-serif; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
  .footer-links a { display: block; color: rgba(245,242,238,0.6); font-size: 0.88rem; text-decoration: none; margin-bottom: 8px; transition: color 0.2s; }
  .footer-links a:hover { color: var(--accent); }
  .footer-contact h4 { font-family: 'Syne', sans-serif; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
  .footer-contact a { display: flex; align-items: center; gap: 8px; color: rgba(245,242,238,0.6); font-size: 0.88rem; text-decoration: none; margin-bottom: 10px; transition: color 0.2s; }
  .footer-contact a:hover { color: var(--accent); }
  .footer-bottom { border-top: 1px solid var(--border); padding-top: 28px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .footer-copy { color: var(--muted); font-size: 0.78rem; }
  .footer-location { color: var(--muted); font-size: 0.78rem; display: flex; align-items: center; gap: 6px; }

  /* ANIMATIONS */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  .reveal { opacity: 0; transform: translateY(40px); transition: opacity 0.7s ease, transform 0.7s ease; }
  .reveal.visible { opacity: 1; transform: translateY(0); }
  .reveal-delay-1 { transition-delay: 0.1s; }
  .reveal-delay-2 { transition-delay: 0.2s; }
  .reveal-delay-3 { transition-delay: 0.3s; }
  .reveal-delay-4 { transition-delay: 0.4s; }

  /* MOBILE */
  @media (max-width: 900px) {
    .work-featured { grid-template-columns: 1fr; }
    .work-featured-visual { min-height: 260px; }
    .about-inner { grid-template-columns: 1fr; gap: 48px; }
    .work-card-info { padding: 40px 32px; }
    .nav-links { display: none; }
    .why-header { flex-direction: column; }
    .services-header { flex-direction: column; }
    .cta-strip { flex-direction: column; }
  }
  @media (max-width: 768px) {
    nav { padding: 18px 24px; }
    .hero { padding: 0 24px 60px; }
    section { padding: 72px 24px; }
    .stats-bar { padding: 24px; }
    .about-stats { grid-template-columns
