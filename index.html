<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wavy Digital | Global Conversion Systems</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#070707;
  --panel:#0f0f0f;
  --panel2:#141414;
  --text:#f5f2ee;
  --muted:#a0a0a0;
  --accent:#c8f55a;
  --border:rgba(255,255,255,0.08);
}

*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}

body{
  font-family:"DM Sans",sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* NAV */
nav{
  position:fixed;
  top:0;left:0;right:0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 42px;
  background:rgba(0,0,0,0.75);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  z-index:1000;
}
.logo{
  font-family:"Syne";
  font-weight:800;
}
.logo span{color:var(--accent)}
.nav-cta{
  background:var(--accent);
  color:#000;
  padding:10px 18px;
  border-radius:999px;
  font-weight:800;
  text-decoration:none;
}

/* HERO (NO IMAGE RELIANCE) */
.hero{
  min-height:100vh;
  display:flex;
  align-items:center;
  padding:120px 42px 80px;
  position:relative;
}

.hero-bg{
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(200,245,90,0.08), transparent 40%),
    radial-gradient(circle at 80% 60%, rgba(200,245,90,0.05), transparent 45%);
}

.hero-inner{
  position:relative;
  max-width:1000px;
}

.kicker{
  color:var(--accent);
  font-size:12px;
  letter-spacing:0.22em;
  text-transform:uppercase;
  margin-bottom:16px;
}

h1{
  font-family:"Syne";
  font-size:clamp(2.8rem,6vw,5.2rem);
  line-height:1.05;
  letter-spacing:-0.03em;
}

h1 span{color:var(--accent)}

.sub{
  margin-top:18px;
  color:var(--muted);
  max-width:620px;
  line-height:1.6;
}

.cta{
  margin-top:28px;
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}

.btn{
  padding:14px 22px;
  border-radius:999px;
  font-weight:800;
  text-decoration:none;
}

.btn-primary{background:var(--accent);color:#000}
.btn-ghost{border:1px solid var(--border);color:var(--text)}

/* SECTION SYSTEM */
section{
  padding:110px 42px;
}

.section-title{
  font-family:"Syne";
  font-size:2rem;
  margin-bottom:36px;
  letter-spacing:-0.02em;
}

.section-sub{
  color:var(--muted);
  max-width:700px;
  margin-bottom:40px;
  line-height:1.6;
}

/* SERVICES */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
}

.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:16px;
  padding:26px;
  transition:0.3s ease;
}

.card:hover{
  transform:translateY(-6px);
  border-color:rgba(200,245,90,0.25);
}

.card h3{
  font-family:"Syne";
  margin-bottom:10px;
}

.card p{
  color:var(--muted);
  font-size:14px;
  line-height:1.5;
}

/* CASE STUDIES (NOT "PORTFOLIO") */
.case-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:18px;
}

.case{
  display:grid;
  grid-template-columns:1fr 1fr;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:18px;
  overflow:hidden;
  transition:0.35s;
}

.case:hover{
  transform:translateY(-6px);
  border-color:rgba(200,245,90,0.25);
}

.thumb{
  min-height:260px;
  background-size:cover;
  background-position:center;
  filter:saturate(1.1);
}

.case-body{
  padding:34px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.tag{
  color:var(--accent);
  font-size:11px;
  letter-spacing:0.2em;
  margin-bottom:10px;
}

.case-body h3{
  font-family:"Syne";
  font-size:1.6rem;
}

.case-body p{
  color:var(--muted);
  margin:12px 0 18px;
  line-height:1.6;
}

.case-body a{
  color:var(--accent);
  font-weight:800;
  text-decoration:none;
}

/* CTA BLOCK */
.cta-block{
  background:linear-gradient(135deg,rgba(200,245,90,0.12),transparent);
  border:1px solid var(--border);
  padding:80px 42px;
  text-align:center;
  border-radius:20px;
}

.cta-block h2{
  font-family:"Syne";
  font-size:clamp(2rem,5vw,3.5rem);
}

.cta-block a{
  display:inline-block;
  margin-top:18px;
  background:var(--accent);
  color:#000;
  padding:14px 26px;
  border-radius:999px;
  text-decoration:none;
  font-weight:900;
}

/* FOOTER */
footer{
  padding:40px 42px;
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  border-top:1px solid var(--border);
  color:var(--muted);
}

/* SCROLL REVEAL */
.reveal{
  opacity:0;
  transform:translateY(18px);
  transition:0.6s ease;
}

.reveal.visible{
  opacity:1;
  transform:translateY(0);
}

/* RESPONSIVE */
@media(max-width:1000px){
  .grid{grid-template-columns:1fr 1fr}
  .case{grid-template-columns:1fr}
}

@media(max-width:600px){
  nav{padding:14px 18px}
  section{padding:80px 18px}
  .grid{grid-template-columns:1fr}
}
</style>
</head>

</nav>

<section class="hero">
  <div class="hero-bg"></div>

  <div class="hero-inner reveal">
    <div class="kicker">Global Conversion Systems</div>

    <h1>
      We build digital systems that <span>turn
