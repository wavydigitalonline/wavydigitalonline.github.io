<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wavy Digital | Web Design Studio — Websites That Convert</title>
<meta name="description" content="Wavy Digital builds fast, professional websites that attract customers and grow your business. Once-off fee. 5-day delivery. WhatsApp us today.">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--black:#080808;--white:#f5f2ee;--accent:#c8f55a;--accent-dark:#a8d93a;--mid:#1a1a1a;--muted:#888;--border:rgba(255,255,255,0.08)}
html{scroll-behavior:smooth}
body{background:var(--black);color:var(--white);font-family:'DM Sans',sans-serif;font-size:16px;line-height:1.6;overflow-x:hidden;cursor:none}

/* CURSOR */
.cursor{width:10px;height:10px;background:var(--accent);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:difference}
.cursor-ring{width:36px;height:36px;border:1.5px solid var(--accent);border-radius:50%;position:fixed;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all 0.15s ease;opacity:0.5}

/* FLOATING WA BUTTON */
.wa-float{position:fixed;bottom:28px;right:28px;z-index:1000;background:var(--accent);color:var(--black);font-family:'Syne',sans-serif;font-weight:700;font-size:0.82rem;padding:14px 22px;border-radius:100px;text-decoration:none;display:flex;align-items:center;gap:8px;box-shadow:0 8px 32px rgba(200,245,90,0.35);transition:transform 0.2s,box-shadow 0.2s;animation:pulse 3s ease infinite}
.wa-float:hover{transform:scale(0.96) translateY(-2px);box-shadow:0 12px 40px rgba(200,245,90,0.5)}
@keyframes pulse{0%,100%{box-shadow:0 8px 32px rgba(200,245,90,0.35)}50%{box-shadow:0 8px 48px rgba(200,245,90,0.6)}}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:20px 48px;backdrop-filter:blur(16px);background:rgba(8,8,8,0.85);border-bottom:1px solid var(--border)}
.nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;letter-spacing:-0.02em;color:var(--white);text-decoration:none}
.nav-logo span{color:var(--accent)}
.nav-links{display:flex;align-items:center;gap:28px}
.nav-link{color:rgba(245,242,238,0.6);font-size:0.85rem;font-weight:500;text-decoration:none;transition:color 0.2s}
.nav-link:hover{color:var(--white)}
.nav-cta{background:var(--accent);color:var(--black);font-family:'Syne',sans-serif;font-weight:700;font-size:0.78rem;letter-spacing:0.06em;text-transform:uppercase;padding:10px 22px;border-radius:100px;text-decoration:none;transition:background 0.2s,transform 0.2s;white-space:nowrap}
.nav-cta:hover{background:var(--accent-dark);transform:scale(0.97)}

/* HERO */
.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:flex-end;padding:0 48px 80px;position:relative;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 65% 55% at 80% 15%,rgba(200,245,90,0.14) 0%,transparent 60%),radial-gradient(ellipse 45% 45% at 5% 85%,rgba(200,245,90,0.07) 0%,transparent 50%)}
.hero-tag{font-size:0.7rem;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;color:var(--accent);margin-bottom:28px;opacity:1;display:flex;align-items:center;gap:12px}
.hero-tag::before{content:'';display:block;width:32px;height:1px;background:var(--accent)}
.hero-headline{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(2.4rem,7.5vw,8.5rem);line-height:0.93;letter-spacing:-0.03em;margin-bottom:48px;opacity:1}
.hero-headline em{font-style:normal;color:var(--accent);display:block}
.hero-bottom{display:flex;align-items:flex-end;justify-content:space-between;gap:40px;flex-wrap:wrap;opacity:1}
.hero-sub{max-width:500px;color:rgba(245,242,238,0.65);font-size:1.05rem;line-height:1.78}
.hero-sub strong{color:var(--white);font-weight:600}
.hero-actions{display:flex;gap:14px;align-items:center;flex-shrink:0;flex-wrap:wrap}
.hero-scroll{position:absolute;bottom:32px;right:48px;font-size:0.68rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:12px;opacity:1}
.hero-scroll::before{content:'';display:block;width:40px;height:1px;background:var(--muted)}

/* BUTTONS */
.btn-primary{background:var(--accent);color:var(--black);font-family:'Syne',sans-serif;font-weight:700;font-size:0.92rem;padding:16px 32px;border-radius:100px;text-decoration:none;transition:transform 0.2s,background 0.2s;display:inline-flex;align-items:center;gap:8px;white-space:nowrap}
.btn-primary:hover{transform:scale(0.97);background:var(--accent-dark)}
.btn-ghost{color:var(--white);font-family:'Syne',sans-serif;font-weight:600;font-size:0.9rem;text-decoration:none;opacity:0.55;transition:opacity 0.2s;white-space:nowrap}
.btn-ghost:hover{opacity:1}
.btn-dark{background:var(--black);color:var(--accent);font-family:'Syne',sans-serif;font-weight:700;font-size:0.95rem;padding:18px 36px;border-radius:100px;text-decoration:none;transition:transform 0.2s,opacity 0.2s;display:inline-flex;align-items:center;gap:10px;white-space:nowrap}
.btn-dark:hover{transform:scale(0.97);opacity:0.9}
.btn-outline-dark{background:transparent;border:2px solid var(--black);color:var(--black);font-family:'Syne',sans-serif;font-weight:700;font-size:0.95rem;padding:18px 36px;border-radius:100px;text-decoration:none;transition:background 0.2s,transform 0.2s;white-space:nowrap}
.btn-outline-dark:hover{background:rgba(0,0,0,0.08);transform:scale(0.97)}
.btn-white{background:var(--white);color:var(--black);font-family:'Syne',sans-serif;font-weight:700;font-size:0.92rem;padding:16px 32px;border-radius:100px;text-decoration:none;transition:transform 0.2s,opacity 0.2s;display:inline-flex;align-items:center;gap:8px;white-space:nowrap}
.btn-white:hover{transform:scale(0.97);opacity:0.9}

/* STATS BAR */
.stats-bar{background:var(--mid);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:28px 48px;display:flex;justify-content:space-around;flex-wrap:wrap;gap:24px}
.stat-item{text-align:center}
.stat-item-num{font-family:'Syne',sans-serif;font-weight:800;font-size:1.7rem;color:var(--accent);letter-spacing:-0.02em;line-height:1;margin-bottom:5px}
.stat-item-label{font-size:0.73rem;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase}

/* MARQUEE */
.marquee-wrap{overflow:hidden;padding:15px 0;background:var(--accent)}
.marquee-track{display:flex;animation:marquee 22s linear infinite;white-space:nowrap}
.marquee-item{font-family:'Syne',sans-serif;font-size:0.7rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--black);padding:0 28px;flex-shrink:0;opacity:0.65}
.marquee-item span{opacity:1;margin-right:28px}

/* SECTIONS */
section{padding:120px 48px}
.section-label{font-size:0.67rem;font-weight:700;letter-spacing:0.24em;text-transform:uppercase;color:var(--accent);margin-bottom:20px;display:flex;align-items:center;gap:12px}
.section-label::after{content:'';flex:1;max-width:40px;height:1px;background:var(--accent)}

/* WHY */
.why{background:var(--mid)}
.why-header{margin-bottom:72px;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:32px}
.why-title{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(2rem,5vw,3.5rem);letter-spacing:-0.02em;line-height:1.05;max-width:520px}
.why-sub{max-width:300px;color:rgba(245,242,238,0.5);font-size:0.93rem;line-height:1.78}
.why-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:2px}
.why-card{background:var(--black);padding:44px 36px;position:relative;overflow:hidden;transition:background 0.3s}
.why-card:hover{background:#0d0d0d}
.why-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);transform:scaleX(0);transform-origin:left;transition:transform 0.4s}
.why-card:hover::after{transform:scaleX(1)}
.why-icon{font-size:2rem;margin-bottom:20px;display:block}
.why-card-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1.05rem;margin-bottom:12px}
.why-card-desc{color:rgba(245,242,238,0.5);font-size:0.87rem;line-height:1.78}
.why-cta{margin-top:64px;text-align:center}

/* SERVICES */
.services{background:var(--black)}
.services-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:80px;flex-wrap:wrap;gap:32px}
.services-title{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(2rem,5vw,3.5rem);line-height:1.05;letter-spacing:-0.02em;max-width:480px}
.services-sub{max-width:280px;color:rgba(245,242,238,0.5);font-size:0.92rem;line-height:1.78}
.services-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:2px}
.service-card{background:var(--mid);padding:44px 36px;position:relative;overflow:hidden;transition:background 0.3s;display:flex;flex-direction:column}
.service-card:hover{background:#222}
.service-card::before{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--accent);transform:scaleX(0);transform-origin:left;transition:transform 0.4s}
.service-card:hover::before{transform:scaleX(1)}
.service-num{font-family:'Syne',sans-serif;font-size:0.67rem;font-weight:700;letter-spacing:0.18em;color:var(--accent);margin-bottom:24px}
.service-icon{font-size:2rem;margin-bottom:16px;display:block}
.service-name{font-family:'Syne',sans-serif;font-weight:700;font-size:1.15rem;margin-bottom:12px;line-height:1.2}
.service-desc{color:rgba(245,242,238,0.5);font-size:0.87rem;line-height:1.78;margin-bottom:24px;flex:1}
.service-cta-link{margin-top:auto;display:inline-flex;align-items:center;gap:6px;background:var(--accent);color:var(--black);font-family:'Syne',sans-serif;font-weight:700;font-size:0.78rem;padding:10px 18px;border-radius:100px;text-decoration:none;width:fit-content;transition:background 0.2s,transform 0.2s}
.service-cta-link:hover{background:var(--accent-dark);transform:scale(0.97)}
.services-cta{margin-top:64px;text-align:center}

/* WORK */
.work{background:var(--mid)}
.work-header{margin-bottom:56px}
.work-title{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(2rem,5vw,3.5rem);letter-spacing:-0.02em;line-height:1.05;margin-bottom:16px}
.work-intro{color:rgba(245,242,238,0.55);font-size:1rem;max-width:480px;line-height:1.78}
.work-featured{background:var(--black);border-radius:16px;overflow:hidden;display:grid;grid-template-columns:1fr 1fr;min-height:440px;margin-bottom:3px;transition:transform 0.3s}
.work-featured:hover{transform:translateY(-4px)}
.work-featured-visual{position:relative;overflow:hidden}
.work-featured-visual img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.5s}
.work-featured:hover .work-featured-visual img{transform:scale(1.04)}
.work-featured-visual::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(200,245,90,0.08) 0%,transparent 60%);pointer-events:none}
.work-card-info{padding:56px 48px;display:flex;flex-direction:column;justify-content:center}
.work-tag{display:inline-flex;align-items:center;gap:8px;background:rgba(200,245,90,0.1);border:1px solid rgba(200,245,90,0.2);color:var(--accent);font-size:0.67rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;padding:6px 14px;border-radius:100px;margin-bottom:24px;width:fit-content}
.work-client{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(1.5rem,3vw,2.1rem);letter-spacing:-0.02em;margin-bottom:14px;line-height:1.1}
.work-desc{color:rgba(245,242,238,0.55);font-size:0.93rem;line-height:1.78;margin-bottom:32px}
.work-actions{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.work-link{display:inline-flex;align-items:center;gap:8px;color:var(--accent);font-family:'Syne',sans-serif;font-weight:700;font-size:0.83rem;text-decoration:none;letter-spacing:0.05em;transition:gap 0.2s}
.work-link:hover{gap:14px}
.work-link-btn{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:var(--black);font-family:'Syne',sans-serif;font-weight:700;font-size:0.78rem;padding:10px 18px;border-radius:100px;text-decoration:none;transition:background 0.2s,transform 0.2s}
.work-link-btn:hover{background:var(--accent-dark);transform:scale(0.97)}
.work-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:3px}
.work-grid-card{background:var(--black);border-radius:12px;overflow:hidden;transition:transform 0.3s;display:flex;flex-direction:column}
.work-grid-card:hover{transform:translateY(-4px)}
.work-grid-thumb{position:relative;overflow:hidden;height:200px}
.work-grid-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.5s}
.work-grid-card:hover .work-grid-thumb img{transform:scale(1.06)}
.work-grid-thumb::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(8,8,8,0.65) 100%);pointer-events:none}
.work-grid-body{padding:26px 26px 28px;flex:1;display:flex;flex-direction:column}
.work-grid-tag{display:inline-flex;background:rgba(200,245,90,0.08);border:1px solid rgba(200,245,90,0.15);color:var(--accent);font-size:0.62rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:4px 10px;border-radius:100px;margin-bottom:10px;width:fit-content}
.work-grid-name{font-family:'Syne',sans-serif;font-weight:700;font-size:1.1rem;letter-spacing:-0.01em;margin-bottom:8px}
.work-grid-desc{color:rgba(245,242,238,0.5);font-size:0.83rem;line-height:1.65;margin-bottom:16px;flex:1}
.work-grid-actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:auto}
.work-grid-link{display:inline-flex;align-items:center;gap:6px;color:var(--accent);font-family:'Syne',sans-serif;font-weight:700;font-size:0.78rem;text-decoration:none;transition:gap 0.2s}
.work-grid-link:hover{gap:10px}
.work-grid-btn{display:inline-flex;align-items:center;gap:6px;background:rgba(200,245,90,0.12);color:var(--accent);font-family:'Syne',sans-serif;font-weight:700;font-size:0.72rem;padding:8px 14px;border-radius:100px;text-decoration:none;border:1px solid rgba(200,245,90,0.2);transition:background 0.2s}
.work-grid-btn:hover{background:rgba(200,245,90,0.22)}
.work-cta{margin-top:56px;background:var(--black);border-radius:16px;padding:56px 48px;display:flex;align-items:center;justify-content:space-between;gap:32px;flex-wrap:wrap}
.work-cta-text h3{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(1.4rem,3vw,2rem);letter-spacing:-0.02em;margin-bottom:10px}
.work-cta-text p{color:rgba(245,242,238,0.55);font-size:0.93rem;max-width:380px;line-height:1.7}

/* ABOUT */
.about{background:var(--black)}
.about-inner{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center}
.about-title{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(2rem,4vw,3rem);letter-spacing:-0.02em;line-height:1.1;margin-bottom:28px}
.about-body{color:rgba(245,242,238,0.6);font-size:1rem;line-height:1.82;margin-bottom:18px}
.about-cta{margin-top:36px;display:flex;gap:14px;flex-wrap:wrap}
.about-location{display:flex;align-items:center;gap:10px;color:var(--accent);font-size:0.85rem;font-weight:500;margin-top:24px}
.about-stats{display:grid;grid-template-columns:1fr 1fr;gap:2px}
.stat-card{background:var(--mid);padding:36px 28px}
.stat-num{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(1.6rem,3vw,2.6rem);color:var(--accent);letter-spacing:-0.03em;line-height:1;margin-bottom:8px;word-break:break-word}
.stat-label{color:rgba(245,242,238,0.5);font-size:0.8rem;line-height:1.5}

/* CTA STRIP */
.cta-strip{background:var(--mid);padding:80px 48px;display:flex;align-items:center;justify-content:space-between;gap:40px;flex-wrap:wrap;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.cta-strip-text h2{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(1.6rem,4vw,2.8rem);letter-spacing:-0.02em;margin-bottom:12px}
.cta-strip-text p{color:rgba(245,242,238,0.55);font-size:1rem;max-width:440px;line-height:1.72}
.cta-strip-actions{display:flex;gap:14px;flex-shrink:0;flex-wrap:wrap}

/* CONTACT */
.contact{background:var(--accent);padding:120px 48px;text-align:center;position:relative;overflow:hidden}
.contact::before{content:'WAVY';position:absolute;font-family:'Syne',sans-serif;font-weight:800;font-size:30vw;color:rgba(0,0,0,0.06);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;white-space:nowrap}
.contact-label{font-size:0.67rem;font-weight:700;letter-spacing:0.24em;text-transform:uppercase;color:rgba(0,0,0,0.5);margin-bottom:24px}
.contact-title{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(2.5rem,7vw,6rem);letter-spacing:-0.03em;color:var(--black);line-height:1;margin-bottom:20px}
.contact-sub{color:rgba(0,0,0,0.55);font-size:1.05rem;max-width:500px;margin:0 auto 48px;line-height:1.75}
.contact-actions{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}

/* FOOTER */
footer{background:var(--black);border-top:1px solid var(--border);padding:40px 48px}
.footer-main{display:flex;align-items:flex-start;justify-content:space-between;gap:40px;flex-wrap:wrap;margin-bottom:40px}
.footer-brand .footer-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;color:var(--white);text-decoration:none;display:block;margin-bottom:12px}
.footer-brand .footer-logo span{color:var(--accent)}
.footer-brand p{color:var(--muted);font-size:0.84rem;max-width:240px;line-height:1.65}
.footer-links h4,.footer-contact h4{font-family:'Syne',sans-serif;font-size:0.72rem;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);margin-bottom:16px}
.footer-links a{display:block;color:rgba(245,242,238,0.6);font-size:0.86rem;text-decoration:none;margin-bottom:8px;transition:color 0.2s}
.footer-links a:hover{color:var(--accent)}
.footer-contact a{display:flex;align-items:center;gap:8px;color:rgba(245,242,238,0.6);font-size:0.86rem;text-decoration:none;margin-bottom:10px;transition:color 0.2s}
.footer-contact a:hover{color:var(--accent)}
.footer-wa{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:var(--black);font-family:'Syne',sans-serif;font-weight:700;font-size:0.8rem;padding:10px 20px;border-radius:100px;text-decoration:none;margin-top:8px;transition:background 0.2s,transform 0.2s}
.footer-wa:hover{background:var(--accent-dark);transform:scale(0.97)}
.footer-bottom{border-top:1px solid var(--border);padding-top:28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.footer-copy{color:var(--muted);font-size:0.78rem}
.footer-location{color:var(--muted);font-size:0.78rem}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.reveal{opacity:1;transform:translateY(0);transition:opacity 0.7s ease,transform 0.7s ease}
.reveal.visible{opacity:1;transform:translateY(0)}
.reveal-delay-1{transition-delay:0.1s}
.reveal-delay-2{transition-delay:0.2s}
.reveal-delay-3{transition-delay:0.3s}
.reveal-delay-4{transition-delay:0.4s}

/* MOBILE */
@media(max-width:900px){
  .work-featured{grid-template-columns:1fr}
  .work-featured-visual{min-height:260px}
  .about-inner{grid-template-columns:1fr;gap:48px}
  .work-card-info{padding:40px 32px}
  .nav-links{display:none}
  .why-header,.services-header,.cta-strip{flex-direction:column}
  .work-cta{flex-direction:column}
}
@media(max-width:768px){
  nav{padding:18px 24px}
  .hero{padding:0 24px 60px}
  section{padding:72px 24px}
  .stats-bar{padding:22px 24px}
  .about-stats{grid-template-columns:1fr 1fr}
  .stat-card{padding:22px 16px}
  .contact{padding:72px 24px}
  footer{padding:32px 24px}
  .footer-bottom{flex-direction:column;text-align:center}
  .work-grid{grid-template-columns:1fr}
  .cta-strip{padd
